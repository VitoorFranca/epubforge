name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips postinstall (playwright browser download),
        # which isn't needed for unit tests
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check versions are not already published
        run: |
          CORE_VER=$(node -p "require('./core/package.json').version")
          CLI_VER=$(node -p "require('./cli/package.json').version")

          if npm view "@epubforge/core@$CORE_VER" version 2>/dev/null | grep -q "$CORE_VER"; then
            echo "::error::@epubforge/core@$CORE_VER is already on npm. Bump the version before tagging."
            exit 1
          fi

          if npm view "epubforge@$CLI_VER" version 2>/dev/null | grep -q "$CLI_VER"; then
            echo "::error::epubforge@$CLI_VER is already on npm. Bump the version before tagging."
            exit 1
          fi

          echo "Versions available for publish: core@$CORE_VER, cli@$CLI_VER"

  publish:
    name: Publish to npm
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: npm        # pauses here until a reviewer approves in GitHub UI
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish @epubforge/core
        run: npm publish -w core --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish epubforge (CLI)
        run: npm publish -w cli --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
